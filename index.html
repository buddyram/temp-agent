<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>temp-agent · weather dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root {
    --bg-0: #07090f;
    --bg-1: #0d1018;
    --bg-2: #141927;
    --line: rgba(255,255,255,0.07);
    --line-2: rgba(255,255,255,0.12);
    --text: #e9edf5;
    --text-dim: #8b94a8;
    --accent: #ff7a59;
    --accent-2: #5fa8ff;
    --hot: #ff5d5d;
    --cold: #5fb6ff;
    --good: #6ee7a7;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(255,122,89,0.12), transparent 60%),
      radial-gradient(1000px 600px at 110% 0%, rgba(95,168,255,0.12), transparent 60%),
      var(--bg-0);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 48px 28px 80px; }
  header { display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; margin-bottom: 36px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center; font-size: 22px;
    box-shadow: 0 8px 30px rgba(255,122,89,0.3);
  }
  h1 { font-size: 22px; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
  .subtitle { color: var(--text-dim); font-size: 13px; margin-top: 2px; }
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--bg-2); border: 1px solid var(--line);
    padding: 8px 14px; border-radius: 999px; font-size: 13px; color: var(--text-dim);
  }
  .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--good); box-shadow: 0 0 0 0 rgba(110,231,167,0.5); animation: pulse 2s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(110,231,167,0.6); }
    70% { box-shadow: 0 0 0 10px rgba(110,231,167,0); }
    100% { box-shadow: 0 0 0 0 rgba(110,231,167,0); }
  }

  .grid { display: grid; gap: 18px; }
  .cards {
    grid-template-columns: repeat(4, 1fr);
    margin-bottom: 18px;
  }
  @media (max-width: 880px) { .cards { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .cards { grid-template-columns: 1fr; } }

  .card {
    background: linear-gradient(180deg, var(--bg-1), var(--bg-2));
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px 22px 20px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(400px 120px at 0% 0%, rgba(255,255,255,0.04), transparent 60%);
  }
  .card .label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-dim); font-weight: 600; }
  .card .value { font-size: 38px; font-weight: 800; margin-top: 8px; letter-spacing: -0.03em; line-height: 1; font-variant-numeric: tabular-nums; }
  .card .sub { color: var(--text-dim); font-size: 12px; margin-top: 8px; font-family: 'JetBrains Mono', monospace; }
  .card.hot .value { background: linear-gradient(135deg, var(--hot), var(--accent)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .card.cold .value { background: linear-gradient(135deg, var(--cold), var(--accent-2)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .card .icon { position: absolute; top: 18px; right: 18px; font-size: 22px; opacity: 0.85; }

  .chart-card { padding: 26px; }
  .chart-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 12px; }
  .chart-title { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .legend { display: flex; gap: 16px; font-size: 12px; color: var(--text-dim); }
  .legend span::before { content: ""; display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; vertical-align: middle; }
  .legend .ln::before { background: var(--accent); }
  .legend .max::before { background: var(--hot); }
  .legend .min::before { background: var(--cold); }
  .chart-wrap { position: relative; height: 420px; }

  .lower { display: grid; grid-template-columns: 2fr 1fr; gap: 18px; margin-top: 18px; }
  @media (max-width: 880px) { .lower { grid-template-columns: 1fr; } }

  .meta-card h3 { margin: 0 0 14px; font-size: 14px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }
  .kv { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
  .kv:last-child { border-bottom: none; }
  .kv .k { color: var(--text-dim); }
  .kv .v { font-family: 'JetBrains Mono', monospace; font-weight: 500; }

  .recent { max-height: 460px; overflow-y: auto; }
  .recent::-webkit-scrollbar { width: 8px; }
  .recent::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 4px; }
  .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .row:last-child { border-bottom: none; }
  .row .t { color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .row .temp { font-weight: 600; font-variant-numeric: tabular-nums; }

  footer { margin-top: 40px; text-align: center; color: var(--text-dim); font-size: 12px; }
  footer a { color: var(--accent-2); text-decoration: none; }

  .loading { text-align: center; padding: 80px 20px; color: var(--text-dim); }
  .err { background: rgba(255,93,93,0.1); border: 1px solid rgba(255,93,93,0.3); color: #ffb4b4; padding: 16px; border-radius: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo">🌡️</div>
      <div>
        <h1>temp-agent</h1>
        <div class="subtitle">live temperature log · open-meteo</div>
      </div>
    </div>
    <div class="pill"><span class="pulse"></span><span id="status">loading…</span></div>
  </header>

  <div id="root">
    <div class="loading">Loading weather data…</div>
  </div>

  <footer>
    Data: <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a> ·
    Source: <a href="https://github.com/buddyram/temp-agent" target="_blank" rel="noopener">github.com/buddyram/temp-agent</a>
  </footer>
</div>

<script>
const cToF = c => c * 9 / 5 + 32;
const fmt = n => (n === null || n === undefined || isNaN(n)) ? '—' : Number(n).toFixed(1);
const fmtTime = iso => {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
};
const fmtRel = iso => {
  if (!iso) return '—';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return `${Math.round(diff)}s ago`;
  if (diff < 3600) return `${Math.round(diff/60)}m ago`;
  if (diff < 86400) return `${Math.round(diff/3600)}h ago`;
  return `${Math.round(diff/86400)}d ago`;
};

async function load() {
  const root = document.getElementById('root');
  const status = document.getElementById('status');
  try {
    const res = await fetch(`outputs/weather.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const state = await res.json();
    render(state);
    status.textContent = 'live';
  } catch (e) {
    root.innerHTML = `<div class="err">Failed to load <code>outputs/weather.json</code>: ${e.message}</div>`;
    status.textContent = 'offline';
  }
}

function render(state) {
  const history = (state.history || []).filter(e => typeof e?.data?.temperature === 'number');
  const latest = history[history.length - 1];
  const currentC = latest?.data?.temperature;
  const maxC = state.max_temperature;
  const minC = state.min_temperature;
  const samples = history.length;

  const root = document.getElementById('root');
  root.innerHTML = `
    <div class="grid cards">
      <div class="card">
        <div class="icon">🌡️</div>
        <div class="label">Current</div>
        <div class="value">${fmt(currentC)}°<span style="font-size:24px;color:var(--text-dim);">C</span></div>
        <div class="sub">${fmt(cToF(currentC))}°F · ${fmtRel(latest?.timestamp)}</div>
      </div>
      <div class="card hot">
        <div class="icon">🔥</div>
        <div class="label">Record High</div>
        <div class="value">${fmt(maxC)}°<span style="font-size:24px;opacity:0.6;">C</span></div>
        <div class="sub">${fmt(cToF(maxC))}°F</div>
      </div>
      <div class="card cold">
        <div class="icon">🥶</div>
        <div class="label">Record Low</div>
        <div class="value">${fmt(minC)}°<span style="font-size:24px;opacity:0.6;">C</span></div>
        <div class="sub">${fmt(cToF(minC))}°F</div>
      </div>
      <div class="card">
        <div class="icon">📊</div>
        <div class="label">Samples</div>
        <div class="value">${samples}</div>
        <div class="sub">since ${fmtTime(state.start_time)}</div>
      </div>
    </div>

    <div class="card chart-card">
      <div class="chart-head">
        <div class="chart-title">Temperature over time</div>
        <div class="legend">
          <span class="ln">temp</span>
          <span class="max">record high</span>
          <span class="min">record low</span>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="chart"></canvas></div>
    </div>

    <div class="lower">
      <div class="card meta-card">
        <h3>Recent samples</h3>
        <div class="recent" id="recent"></div>
      </div>
      <div class="card meta-card">
        <h3>Stats</h3>
        <div class="kv"><span class="k">Tracking since</span><span class="v">${fmtTime(state.start_time)}</span></div>
        <div class="kv"><span class="k">Total samples</span><span class="v">${samples}</span></div>
        <div class="kv"><span class="k">Latest reading</span><span class="v">${fmtTime(latest?.timestamp)}</span></div>
        <div class="kv"><span class="k">Wind speed</span><span class="v">${latest?.data?.windspeed ?? '—'} km/h</span></div>
        <div class="kv"><span class="k">Wind direction</span><span class="v">${latest?.data?.winddirection ?? '—'}°</span></div>
        <div class="kv"><span class="k">Weather code</span><span class="v">${latest?.data?.weathercode ?? '—'}</span></div>
        <div class="kv"><span class="k">Range (°C)</span><span class="v">${fmt(minC)} → ${fmt(maxC)}</span></div>
        <div class="kv"><span class="k">Range (°F)</span><span class="v">${fmt(cToF(minC))} → ${fmt(cToF(maxC))}</span></div>
      </div>
    </div>
  `;

  const recent = document.getElementById('recent');
  recent.innerHTML = history.slice(-50).reverse().map(e => {
    const t = e.data.temperature;
    const isMax = t === maxC;
    const isMin = t === minC;
    const tag = isMax ? ' 🔥' : isMin ? ' 🥶' : '';
    return `<div class="row"><span class="t">${fmtTime(e.timestamp)}</span><span class="temp">${fmt(t)}°C / ${fmt(cToF(t))}°F${tag}</span></div>`;
  }).join('');

  drawChart(history, maxC, minC);
}

function drawChart(history, maxC, minC) {
  const ctx = document.getElementById('chart').getContext('2d');
  const data = history.map(e => ({ x: new Date(e.timestamp), y: e.data.temperature }));
  const grad = ctx.createLinearGradient(0, 0, 0, 420);
  grad.addColorStop(0, 'rgba(255,122,89,0.35)');
  grad.addColorStop(1, 'rgba(255,122,89,0)');

  new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [{
        label: 'Temp °C',
        data,
        borderColor: '#ff7a59',
        backgroundColor: grad,
        borderWidth: 2.5,
        tension: 0.35,
        pointRadius: 2,
        pointHoverRadius: 6,
        pointBackgroundColor: '#ff7a59',
        pointBorderColor: '#fff',
        pointBorderWidth: 1,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0d1018',
          borderColor: 'rgba(255,255,255,0.12)',
          borderWidth: 1,
          padding: 12,
          titleColor: '#e9edf5',
          bodyColor: '#8b94a8',
          callbacks: {
            label: c => `${c.parsed.y.toFixed(1)}°C / ${cToF(c.parsed.y).toFixed(1)}°F`,
          }
        },
        annotation: {}
      },
      scales: {
        x: {
          type: 'time',
          time: { tooltipFormat: 'PP HH:mm', displayFormats: { hour: 'MMM d HH:mm', day: 'MMM d' } },
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#8b94a8', maxRotation: 0, autoSkip: true, maxTicksLimit: 8 },
          border: { color: 'rgba(255,255,255,0.08)' },
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#8b94a8', callback: v => v + '°C' },
          border: { color: 'rgba(255,255,255,0.08)' },
        }
      }
    },
    plugins: [{
      id: 'recordLines',
      afterDraw(chart) {
        const { ctx, chartArea: { left, right }, scales: { y } } = chart;
        ctx.save();
        ctx.setLineDash([4, 4]);
        ctx.lineWidth = 1;
        if (typeof maxC === 'number') {
          const yMax = y.getPixelForValue(maxC);
          ctx.strokeStyle = 'rgba(255,93,93,0.6)';
          ctx.beginPath(); ctx.moveTo(left, yMax); ctx.lineTo(right, yMax); ctx.stroke();
          ctx.fillStyle = '#ff5d5d'; ctx.font = '11px Inter';
          ctx.fillText(`max ${maxC}°C`, left + 6, yMax - 4);
        }
        if (typeof minC === 'number') {
          const yMin = y.getPixelForValue(minC);
          ctx.strokeStyle = 'rgba(95,182,255,0.6)';
          ctx.beginPath(); ctx.moveTo(left, yMin); ctx.lineTo(right, yMin); ctx.stroke();
          ctx.fillStyle = '#5fb6ff'; ctx.font = '11px Inter';
          ctx.fillText(`min ${minC}°C`, left + 6, yMin + 14);
        }
        ctx.restore();
      }
    }]
  });
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
