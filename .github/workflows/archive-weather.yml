name: archive-weather

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weather-writes
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Archive and delete
        run: |
          if [ ! -f outputs/weather.json ]; then
            echo "outputs/weather.json not present; nothing to archive"
            exit 0
          fi
          ts=$(date -u +%Y%m%dT%H%M%SZ)
          dest="outputs/archives/weather${ts}"
          mkdir -p "$dest"
          git mv outputs/weather.json "$dest/weather.json"
          if [ -f outputs/image.png ]; then
            git mv outputs/image.png "$dest/image.png"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$dest"
          git commit -m "archive outputs -> ${dest}"
          git push
