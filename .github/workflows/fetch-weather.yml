name: fetch-weather

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force a tick regardless of schedule'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: weather-writes
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          LATITUDE: ${{ secrets.LATITUDE }}
          LONGITUDE: ${{ secrets.LONGITUDE }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          FORCE: ${{ inputs.force && '1' || '0' }}

      - name: Regenerate forecast
        run: python ml/predict.py --live-only
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/weather.json outputs/image.png outputs/forecast.json
          if git diff --cached --quiet; then
            echo "No changes to outputs"
            exit 0
          fi
          git commit -m "weather: append sample"
          git push
